services:
  backend:
    build:
      context: ./backend
    environment:
      PORT: 4000
      NODE_ENV: production
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    environment:
      # Points to the backend service name on the Docker internal network
      BACKEND_URL: http://backend:4000
    depends_on:
      - backend
    restart: unless-stopped
